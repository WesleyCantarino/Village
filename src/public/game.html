<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Village Wars</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .loading-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .loading-overlay .spinner { width: 40px; height: 40px; border-width: 3px; }
    .loading-overlay p { color: var(--parchment); font-size: 1rem; letter-spacing: 2px; }

    .game-view { padding-top: 96px; }

    /* ── Village scene ── */
    .village-scene {
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 16px 40px;
    }
    .village-name-banner {
      color: var(--gold); font-size: 1.1rem; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 12px;
      text-shadow: 0 0 20px rgba(212,175,55,0.4); opacity: 0.9;
    }
    .village-canvas-wrap {
      position: relative; display: inline-block;
      box-shadow: 0 0 0 3px var(--gold), 0 0 0 6px var(--wood-medium),
                  0 0 60px rgba(0,0,0,0.8);
      border-radius: 10px; overflow: hidden;
    }
    #villageCanvas {
      display: block; cursor: grab; user-select: none;
    }
    #villageCanvas:active { cursor: grabbing; }
    .map-controls {
      display: flex; gap: 6px; margin-top: 10px; justify-content: center;
    }
    .map-controls button {
      background: var(--wood-dark); color: var(--gold);
      border: 2px solid var(--gold); width: 34px; height: 34px;
      border-radius: 4px; font-size: 1.1em; cursor: pointer;
      font-weight: bold; line-height: 1; transition: background .2s;
    }
    .map-controls button:hover { background: var(--wood-medium); }
    .coord-badge {
      margin-top: 6px; color: rgba(212,175,55,0.5);
      font-size: 0.75rem; font-style: italic;
    }

    /* ── Notifications ── */
    .notification { animation: notif-in .3s ease-out, notif-fade .5s ease-in 3.5s forwards; }
    @keyframes notif-fade { to { opacity: 0; transform: translateX(20px); } }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <p>Carregando...</p>
  </div>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header id="game-header">
    <div class="header-logo">⚔️ Village Wars</div>
    <nav class="header-nav">
      <button class="nav-btn active" data-view="village"   onclick="showView('village')">Aldeia</button>
      <button class="nav-btn"        data-view="buildings" onclick="showView('buildings')">Edificações</button>
      <button class="nav-btn"        data-view="map"       onclick="showView('map')">Mapa</button>
    </nav>
    <div class="header-resources">
      <div class="resource-cell">
        <span class="resource-icon">🪵</span>
        <div class="resource-info">
          <div><span class="resource-amount" id="res-wood">0</span><span class="resource-max" id="res-wood-max"></span></div>
          <div class="resource-prod" id="res-wood-prod">+0/h</div>
        </div>
      </div>
      <div class="resource-cell">
        <span class="resource-icon">🧱</span>
        <div class="resource-info">
          <div><span class="resource-amount" id="res-clay">0</span><span class="resource-max" id="res-clay-max"></span></div>
          <div class="resource-prod" id="res-clay-prod">+0/h</div>
        </div>
      </div>
      <div class="resource-cell">
        <span class="resource-icon">⛓️</span>
        <div class="resource-info">
          <div><span class="resource-amount" id="res-iron">0</span><span class="resource-max" id="res-iron-max"></span></div>
          <div class="resource-prod" id="res-iron-prod">+0/h</div>
        </div>
      </div>
    </div>
    <div class="header-player">
      <span class="header-player-name" id="playerName">Jogador</span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </header>

  <!-- ── Build Queue Bar ──────────────────────────────────────────────────── -->
  <div id="build-queue-bar"></div>

  <!-- ── Village View ─────────────────────────────────────────────────────── -->
  <div id="view-village" class="game-view active">
    <div class="village-scene">
      <div class="village-name-banner" id="villageName">Aldeia</div>
      <div class="village-canvas-wrap">
        <canvas id="villageCanvas" width="620" height="620"></canvas>
      </div>
      <div class="map-controls">
        <button onclick="zoomIn()" title="Aproximar">+</button>
        <button onclick="zoomOut()" title="Afastar">−</button>
        <button onclick="resetZoom()" title="Resetar">↺</button>
      </div>
      <div class="coord-badge" id="coordBadge"></div>
    </div>
  </div>

  <!-- ── Buildings View ───────────────────────────────────────────────────── -->
  <div id="view-buildings" class="game-view">
    <div class="section-header">Edificações</div>
    <div id="buildingsGrid" class="buildings-grid"
         style="padding:0 20px 40px; max-width:1100px; margin:0 auto;"></div>
  </div>

  <!-- ── Map View ─────────────────────────────────────────────────────────── -->
  <div id="view-map" class="game-view">
    <div class="map-container">
      <div class="map-title">Mapa Mundial</div>
      <div id="worldGrid" class="world-grid">
        <div class="loading"><div class="spinner"></div> Carregando...</div>
      </div>
    </div>
  </div>

  <!-- ── Building Modal ───────────────────────────────────────────────────── -->
  <div id="buildingModal" class="modal hidden">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-content">
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- ── Notifications ────────────────────────────────────────────────────── -->
  <div id="notifications"></div>

  <script src="/js/game.js"></script>
</body>
</html>
